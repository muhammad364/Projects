name: CI — Build, Test, Lighthouse

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build static site
        run: npm run build

      - name: Verify /out exists
        run: test -d out && echo "Static build OK"

      # --- Lighthouse CI ---
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@latest

      - name: Serve & run Lighthouse
        run: |
          npx serve out -l 8080 &
          sleep 3
          lhci autorun --config=lighthouserc.json || true

      # --- E2E (optional — uncomment when Playwright is installed in CI) ---
      # - name: Install Playwright browsers
      #   run: npx playwright install --with-deps chromium
      # - name: Run E2E tests
      #   run: npm run test:e2e
